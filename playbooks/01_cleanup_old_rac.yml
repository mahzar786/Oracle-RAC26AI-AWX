---
- name: Cleanup old Oracle RAC/Grid remnants
  hosts: all
  become: true
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Stop CRS if old Grid home exists
      shell: |
        if [ -x "{{ grid_home }}/bin/crsctl" ]; then
          {{ grid_home }}/bin/crsctl stop crs -f || true
        fi
      changed_when: false
      failed_when: false

    - name: Kill old oracle/grid processes
      shell: |
        pkill -9 -u oracle || true
        pkill -9 -u grid || true
      changed_when: false
      failed_when: false

    - name: Remove old Grid and Oracle homes
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ grid_home }}"
        - "{{ oracle_home }}"

    - name: Remove old Oracle temp/socket files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/tmp/.oracle
        - /tmp/.oracle
        - /etc/oracle

    - name: Remove old Oracle service files
      shell: |
        rm -f /etc/init.d/init.*
        rm -f /etc/systemd/system/oracle*.service
        rm -f /etc/systemd/system/ohasd.service
        systemctl daemon-reload || true
      changed_when: false
      failed_when: false

    - name: Remove old Oracle inventory pointer only
      file:
        path: /etc/oraInst.loc
        state: absent

    - name: Clean old installer temp files
      shell: |
        rm -rf /tmp/CVU_* /tmp/OraInstall* /tmp/GridSetupActions* /tmp/InstallActions*
      changed_when: false
      failed_when: false

    - name: Kill remaining Grid/Oracle installer and Java processes
      shell: |
        pkill -9 -f "{{ grid_home }}" || true
        pkill -9 -f "{{ oracle_home }}" || true
        pkill -9 -f "gridSetup.sh" || true
        pkill -9 -f "runInstaller" || true
        pkill -9 -f "cluvfy" || true
        pkill -9 -f "oracle.install" || true
        pkill -9 -f "OraInstall" || true
      changed_when: false
      failed_when: false

    - name: Stop Oracle High Availability Services
      shell: |
        if [ -x /etc/init.d/init.ohasd ]; then
        /etc/init.d/init.ohasd stop || true
        fi

        if [ -x /etc/oracle.ahf/bin/tfactl ]; then
        /etc/oracle.ahf/bin/tfactl stop || true
        fi

        pkill -9 -f ohasd || true
        pkill -9 -f cssd || true
        pkill -9 -f evmd || true
        pkill -9 -f gipcd || true
        pkill -9 -f mdnsd || true
        pkill -9 -f gpnpd || true
         pkill -9 -f tfa || true
      ignore_errors: yes
      changed_when: false

    - name: Clean old Oracle install logs and temp files
      shell: |
        rm -rf /tmp/CVU_* \
               /tmp/OraInstall* \
               /tmp/GridSetupActions* \
               /tmp/InstallActions* \
               /tmp/cvutrace_* \
               /tmp/hsperfdata_grid \
               /tmp/hsperfdata_oracle \
               /tmp/hsperfdata_root \
               /tmp/.oracle \
               /var/tmp/.oracle

        find /tmp -maxdepth 1 -type f -mtime +1 -delete || true
        find /var/tmp -maxdepth 1 -type f -mtime +1 -delete || true
      changed_when: false
      failed_when: false

    - name: Clean package cache
      shell: |
        dnf clean all || true
        rm -rf /var/cache/dnf/* /var/cache/yum/* || true
      changed_when: false
      failed_when: false

    - name: Restart journald to release deleted journal files
      systemd:
        name: systemd-journald
        state: restarted
      failed_when: false

    - name: Check deleted open files after cleanup
      shell: |
        lsof +L1 || true
      register: deleted_files_check
      changed_when: false

    - name: Show deleted open files
      debug:
        var: deleted_files_check.stdout_lines

    - name: Verify no Oracle/Grid processes remain
      shell: |
        ps -ef | egrep 'oracle|grid|asm|crsd|ohasd|tnslsnr|gridSetup|runInstaller|cluvfy|OraInstall' | grep -v grep || true
      register: oracle_processes
      changed_when: false

    - name: Show remaining Oracle/Grid processes
      debug:
        var: oracle_processes.stdout_lines

    - name: Show disk space after cleanup
      shell: |
        df -h
        echo
        du -xhd1 / 2>/dev/null | sort -h
      register: disk_after_cleanup
      changed_when: false

    - name: Print disk space after cleanup
      debug:
        var: disk_after_cleanup.stdout_lines


    - name: Show remaining Oracle/Grid files
      shell: |
        echo "Node: $(hostname)"
        echo "Checking homes..."
        [ -d "{{ grid_home }}" ] && echo "GRID_HOME_EXISTS" || echo "GRID_HOME_REMOVED"
        [ -d "{{ oracle_home }}" ] && echo "ORACLE_HOME_EXISTS" || echo "ORACLE_HOME_REMOVED"
        [ -f /etc/oraInst.loc ] && echo "ORAINST_EXISTS" || echo "ORAINST_REMOVED"
        ps -ef | egrep 'crsd.bin|ocssd.bin|asm_pmon|ora_pmon|tnslsnr' | grep -v grep || echo "NO_ORACLE_PROCESSES"
      register: cleanup_status
      changed_when: false

    - name: Print cleanup status
      debug:
        var: cleanup_status.stdout_lines

###############################################################################
# CLEAN GRID HOMES AND INVENTORY FOR FRESH INSTALL
###############################################################################
- name: Clean Grid homes and inventory for fresh installation
  hosts: all
  become: true
  gather_facts: false
  serial: 1

  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Stop any remaining Grid installer processes
      ansible.builtin.shell: |
        pkill -9 -f "gridSetup.sh" || true
        pkill -9 -f "runInstaller" || true
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Check whether Clusterware processes are still running
      ansible.builtin.shell: |
        ps -ef | egrep 'ohasd|crsd|ocssd|evmd|asm_pmon' | grep -v grep || true
      args:
        executable: /bin/bash
      register: grid_process_check
      changed_when: false

    - name: Display remaining Grid processes
      ansible.builtin.debug:
        var: grid_process_check.stdout_lines

    - name: Remove old Grid Home completely
      ansible.builtin.file:
        path: "{{ grid_home }}"
        state: absent

    - name: Recreate empty Grid Home
      ansible.builtin.file:
        path: "{{ grid_home }}"
        state: directory
        owner: grid
        group: oinstall
        mode: "0775"

    - name: Remove old Grid Base completely
      ansible.builtin.file:
        path: "{{ grid_base }}"
        state: absent

    - name: Recreate empty Grid Base
      ansible.builtin.file:
        path: "{{ grid_base }}"
        state: directory
        owner: grid
        group: oinstall
        mode: "0775"

    - name: Remove old central Oracle inventory
      ansible.builtin.file:
        path: /u01/app/oraInventory
        state: absent

    - name: Recreate empty central Oracle inventory
      ansible.builtin.file:
        path: /u01/app/oraInventory
        state: directory
        owner: grid
        group: oinstall
        mode: "0775"

    - name: Remove previous temporary Grid response and install logs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/grid_install.rsp
        - /tmp/grid_install_stdout.log

    - name: Check Grid Home is empty
      ansible.builtin.shell: |
        find "{{ grid_home }}" -mindepth 1 -print -quit
      args:
        executable: /bin/bash
      register: grid_home_contents
      changed_when: false

    - name: Fail if Grid Home is not empty
      ansible.builtin.assert:
        that:
          - grid_home_contents.stdout | trim == ""
        fail_msg: >-
          {{ grid_home }} is not empty on {{ inventory_hostname }}.
        success_msg: >-
          {{ grid_home }} is empty on {{ inventory_hostname }}.

    - name: Check Grid Base is empty
      ansible.builtin.shell: |
        find "{{ grid_base }}" -mindepth 1 -print -quit
      args:
        executable: /bin/bash
      register: grid_base_contents
      changed_when: false

    - name: Fail if Grid Base is not empty
      ansible.builtin.assert:
        that:
          - grid_base_contents.stdout | trim == ""
        fail_msg: >-
          {{ grid_base }} is not empty on {{ inventory_hostname }}.
        success_msg: >-
          {{ grid_base }} is empty on {{ inventory_hostname }}.

    - name: Check central inventory is empty
      ansible.builtin.shell: |
        find /u01/app/oraInventory -mindepth 1 -print -quit
      args:
        executable: /bin/bash
      register: inventory_contents
      changed_when: false

    - name: Fail if central inventory is not empty
      ansible.builtin.assert:
        that:
          - inventory_contents.stdout | trim == ""
        fail_msg: >-
          /u01/app/oraInventory is not empty on {{ inventory_hostname }}.
        success_msg: >-
          /u01/app/oraInventory is empty on {{ inventory_hostname }}.

###############################################################################
# VERIFY SECONDARY NODE IS READY FOR ORACLE SOFTWARE COPY
###############################################################################
- name: Validate secondary Grid Home for Oracle remote copy
  hosts: "{{ node2_name }}"
  become: true
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Check secondary Grid Home is completely empty
      ansible.builtin.shell: |
        if [ ! -d "{{ grid_home }}" ]; then
          echo "MISSING"
        elif [ -z "$(find "{{ grid_home }}" -mindepth 1 -print -quit)" ]; then
          echo "EMPTY"
        else
          echo "NOT_EMPTY"
          find "{{ grid_home }}" -mindepth 1 -maxdepth 2 | head -50
        fi
      args:
        executable: /bin/bash
      register: secondary_grid_home_check
      changed_when: false

    - name: Assert secondary Grid Home is ready
      ansible.builtin.assert:
        that:
          - secondary_grid_home_check.stdout_lines[0] == "EMPTY"
        fail_msg: >-
          {{ grid_home }} on {{ node2_name }} is not empty.
          Oracle cannot copy Grid software from {{ node1_name }}.
        success_msg: >-
          {{ grid_home }} on {{ node2_name }} is empty and ready
          for Oracle remote software copy.

