---
###############################################################################
# PLAY 1: Validate RAC database creation prerequisites
###############################################################################
- name: Validate RAC database creation prerequisites
  hosts: "{{ node1_name }}"
  become: true
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Validate required database variables
      ansible.builtin.assert:
        that:
          - db_home is defined
          - db_name is defined
          - db_unique_name is defined
          - pdb_name is defined
          - sys_password is defined
          - system_password is defined
          - pdb_admin_password is defined
          - data_diskgroup is defined
          - fra_diskgroup is defined
          - character_set is defined
          - national_character_set is defined
          - db_memory_mb is defined
          - recovery_area_size_mb is defined
          - node1_name is defined
          - node2_name is defined
        fail_msg: "One or more RAC database variables are missing."
        success_msg: "Required RAC database variables are defined."

    - name: Verify Grid cluster is healthy
      ansible.builtin.command:
        argv:
          - "{{ grid_home }}/bin/crsctl"
          - check
          - cluster
          - -all
      register: cluster_status
      changed_when: false

    - name: Show cluster status
      ansible.builtin.debug:
        var: cluster_status.stdout_lines

    - name: Verify DATA and FRA diskgroups
      become_user: grid
      ansible.builtin.command:
        argv:
          - "{{ grid_home }}/bin/asmcmd"
          - lsdg
      register: diskgroup_status
      changed_when: false

    - name: Assert DATA and FRA are mounted
      ansible.builtin.assert:
        that:
          - data_diskgroup in diskgroup_status.stdout
          - fra_diskgroup in diskgroup_status.stdout
        fail_msg: "DATA and FRA ASM diskgroups are not mounted."
        success_msg: "DATA and FRA ASM diskgroups are mounted."

    - name: Verify DBCA exists
      ansible.builtin.stat:
        path: "{{ db_home }}/bin/dbca"
      register: dbca_stat

    - name: Fail if DBCA is unavailable
      ansible.builtin.assert:
        that:
          - dbca_stat.stat.exists
          - dbca_stat.stat.executable
        fail_msg: "{{ db_home }}/bin/dbca is missing or not executable."

    - name: Check whether database already exists
      become_user: oracle
      ansible.builtin.shell: |
        "{{ grid_home }}/bin/srvctl" config database -d "{{ db_unique_name }}"
      args:
        executable: /bin/bash
      register: existing_database
      changed_when: false
      failed_when: false

    - name: Stop if database already exists
      ansible.builtin.assert:
        that:
          - existing_database.rc != 0
        fail_msg: >-
          Database {{ db_unique_name }} already exists in Clusterware.
          Do not rerun DBCA without removing or renaming the existing database.
        success_msg: "Database {{ db_unique_name }} does not already exist."

###############################################################################
# PLAY 2: Run DBCA prerequisite checks
###############################################################################
- name: Run DBCA RAC prerequisite checks
  hosts: "{{ node1_name }}"
  become: true
  become_user: oracle
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml

  environment:
    ORACLE_BASE: "{{ oracle_base }}"
    ORACLE_HOME: "{{ db_home }}"
    PATH: "{{ db_home }}/bin:{{ grid_home }}/bin:/usr/bin:/bin"

  tasks:
    - name: Execute DBCA RAC prerequisites
      ansible.builtin.shell: |
        set -o pipefail

        "{{ db_home }}/bin/dbca" \
          -silent \
          -executePrereqs \
          -databaseConfigType RAC \
          -nodelist "{{ node1_name }},{{ node2_name }}" \
          2>&1 | tee /tmp/dbca_prereqs.log

        exit ${PIPESTATUS[0]}
      args:
        executable: /bin/bash
      register: dbca_prereqs
      changed_when: false
      failed_when: false

    - name: Show DBCA prerequisite output
      ansible.builtin.debug:
        var: dbca_prereqs.stdout_lines

###############################################################################
# PLAY 3: Create RAC CDB and PDB
###############################################################################
- name: Create Oracle RAC CDB and PDB
  hosts: "{{ node1_name }}"
  become: true
  become_user: oracle
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml

  environment:
    ORACLE_BASE: "{{ oracle_base }}"
    ORACLE_HOME: "{{ db_home }}"
    PATH: "{{ db_home }}/bin:{{ grid_home }}/bin:/usr/bin:/bin"

  tasks:
    - name: Remove previous DBCA log
      ansible.builtin.file:
        path: /tmp/dbca_create_database.log
        state: absent

    - name: Create RAC CDB and PDB using DBCA
      no_log: true
      ansible.builtin.shell: |
        set -o pipefail

        "{{ db_home }}/bin/dbca" \
          -silent \
          -createDatabase \
          -templateName General_Purpose.dbc \
          -gdbName "{{ db_name }}" \
          -sid "{{ db_name }}" \
          -dbUniqueName "{{ db_unique_name }}" \
          -databaseConfigType RAC \
          -adminManaged \
          -nodelist "{{ node1_name }},{{ node2_name }}" \
          -createAsContainerDatabase true \
          -numberOfPDBs 1 \
          -pdbName "{{ pdb_name }}" \
          -pdbAdminPassword "{{ pdb_admin_password }}" \
          -sysPassword "{{ sys_password }}" \
          -systemPassword "{{ system_password }}" \
          -storageType ASM \
          -datafileDestination "+{{ data_diskgroup }}" \
          -recoveryAreaDestination "+{{ fra_diskgroup }}" \
          -recoveryAreaSize "{{ recovery_area_size_mb }}" \
          -useOMF true \
          -characterSet "{{ character_set }}" \
          -nationalCharacterSet "{{ national_character_set }}" \
          -totalMemory "{{ db_memory_mb }}" \
          -databaseType MULTIPURPOSE \
          -emConfiguration NONE \
          -enableArchive true \
          -archiveLogMode AUTO \
          2>&1 | tee /tmp/dbca_create_database.log

        exit ${PIPESTATUS[0]}
      args:
        executable: /bin/bash
      register: dbca_create
      changed_when: true

    - name: Confirm DBCA completed
      ansible.builtin.debug:
        msg: "DBCA command completed. Passwords and detailed command output are hidden."

###############################################################################
# PLAY 4: Validate RAC database and PDB
###############################################################################
- name: Validate RAC database and PDB
  hosts: "{{ node1_name }}"
  become: true
  become_user: oracle
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml

  environment:
    ORACLE_BASE: "{{ oracle_base }}"
    ORACLE_HOME: "{{ db_home }}"
    ORACLE_SID: "{{ db_name }}1"
    PATH: "{{ db_home }}/bin:{{ grid_home }}/bin:/usr/bin:/bin"

  tasks:
    - name: Check RAC database status
      ansible.builtin.command:
        argv:
          - "{{ grid_home }}/bin/srvctl"
          - status
          - database
          - -d
          - "{{ db_unique_name }}"
      register: database_status
      changed_when: false

    - name: Show RAC database status
      ansible.builtin.debug:
        var: database_status.stdout_lines

    - name: Validate instances and PDB
      ansible.builtin.shell: |
        "{{ db_home }}/bin/sqlplus" -s / as sysdba <<'SQL'
        set lines 200 pages 100 feedback on
        select inst_id, instance_name, host_name, status
        from gv$instance
        order by inst_id;

        select name, open_mode
        from v$pdbs
        order by con_id;

        alter pluggable database {{ pdb_name }} open instances=all;
        alter pluggable database {{ pdb_name }} save state instances=all;

        select name, open_mode
        from v$pdbs
        order by con_id;

        exit
        SQL
      args:
        executable: /bin/bash
      register: database_sql_validation
      changed_when: false

    - name: Show SQL validation
      ansible.builtin.debug:
        var: database_sql_validation.stdout_lines

    - name: Assert both RAC instances are running
      ansible.builtin.assert:
        that:
          - "'{{ db_name }}1' in database_status.stdout"
          - "'{{ db_name }}2' in database_status.stdout"
          - "'running' in database_status.stdout"
        fail_msg: "Both RAC database instances are not running."
        success_msg: "Both RAC instances are running."

###############################################################################
# PLAY 5: Final summary
###############################################################################
- name: RAC database creation summary
  hosts: "{{ node1_name }}"
  become: true
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Print RAC database summary
      ansible.builtin.debug:
        msg:
          - "RAC CDB creation completed."
          - "Database unique name: {{ db_unique_name }}"
          - "Instances: {{ db_name }}1, {{ db_name }}2"
          - "PDB: {{ pdb_name }}"
          - "Data diskgroup: +{{ data_diskgroup }}"
          - "Recovery diskgroup: +{{ fra_diskgroup }}"
          - "Next AWX job: 11 - Post Validation"
